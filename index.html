<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Precision Digital Tools</title>
    <style>
        :root {
            --brand-gold: #d4af37;
            --brand-silver: #e0e0e0;
            --bg-dark: #080808;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-dark);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Updated Brand Header for Logo 2 */
        .header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .brand-logo {
            height: 80px; /* Adjust this height to fit your logo design */
            width: auto;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            opacity: 0.95;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Split Sections */
        .section {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            transition: var(--transition);
            border-bottom: 1px solid #1a1a1a;
        }

        .section:hover {
            flex: 1.4;
            background: rgba(255,255,255,0.03);
        }

        .label {
            position: relative;
            z-index: 10;
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 18px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .section:hover .label {
            letter-spacing: 25px;
            color: white;
        }

        /* Mechanical Gear Visuals */
        .gear-system {
            position: absolute;
            opacity: 0.15;
            transition: var(--transition);
        }

        .section:hover .gear-system {
            opacity: 0.6;
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes rotate-main {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin {
            animation: rotate-main 20s linear infinite;
        }

        .section:hover .spin {
            animation-duration: 5s; /* Acceleration */
        }

        .details {
            position: absolute;
            bottom: 30px;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: #555;
            text-transform: uppercase;
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 600px) {
            .brand-logo {
                height: 60px; /* Smaller logo for mobile */
            }

            .label {
                font-size: 1.8rem;
                letter-spacing: 8px;
            }
            
            .section:hover .label {
                letter-spacing: 12px;
            }

            .gear-system svg {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="/logo2.png" alt="CalcClock Logo" class="brand-logo">
    </div>

    <div class="container">
        
        <a href="/clock/" class="section" style="border-bottom: 1px solid var(--brand-gold);">
            <div class="gear-system">
                <svg width="500" height="500" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="var(--brand-gold)" stroke-width="0.2" stroke-dasharray="1,3"/>
                    <g class="spin" style="transform-origin: center;">
                        <circle cx="50" cy="50" r="15" fill="none" stroke="var(--brand-gold)" stroke-width="1"/>
                        <rect x="49" y="10" width="2" height="80" fill="var(--brand-gold)" opacity="0.5"/>
                        <rect x="10" y="49" width="80" height="2" fill="var(--brand-gold)" opacity="0.5"/>
                        <circle cx="50" cy="15" r="3" fill="var(--brand-gold)"/>
                        <circle cx="50" cy="85" r="3" fill="var(--brand-gold)"/>
                    </g>
                </svg>
            </div>
            <div class="label" style="color: var(--brand-gold);">Clock</div>
            <div class="details">Chronometric Engine v1.0</div>
        </a>

        <a href="/calc/" class="section">
            <div class="gear-system">
                <svg width="500" height="500" viewBox="0 0 100 100">
                    <g class="spin" style="transform-origin: 40% 50%; animation-direction: reverse; animation-duration: 15s;">
                        <circle cx="40" cy="50" r="20" fill="none" stroke="var(--brand-silver)" stroke-width="2" stroke-dasharray="5,2"/>
                    </g>
                    <g class="spin" style="transform-origin: 70% 45%; animation-duration: 25s;">
                        <circle cx="70" cy="45" r="12" fill="none" stroke="#444" stroke-width="3" stroke-dasharray="2,2"/>
                    </g>
                </svg>
            </div>
            <div class="label" style="color: var(--brand-silver);">Calculator</div>
            <div class="details">Arithmos Logic Unit</div>
        </a>

    </div>

</body>
</html>
