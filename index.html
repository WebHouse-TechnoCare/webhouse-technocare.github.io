<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHT | IT Solutions & Utility Hub</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #00ff95; /* Professional Tech Green */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 3rem;
            border-radius: 8px;
            background: linear-gradient(145deg, #111, #080808);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .brand-accent {
            color: var(--accent-color);
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .status-bar {
            background: #222;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WHT<span class="brand-accent">.</span></h1>
        <p>Advanced IT Solutions & Digital Utility Hub</p>
        
        <div class="status-bar">
            > Initializing tools... <span class="brand-accent">Coming Soon</span><span class="cursor">_</span>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 WHT IT Services UK. All rights reserved.
    </div>

</body>
</html>
