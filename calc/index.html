<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Computation</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <style>
        :root {
            --silver: #e0e0e0;
            --gold: #d4af37;
            --bg: #0a0a0a;
            --panel: #151515;
        }

        body {
            background: var(--bg);
            color: var(--silver);
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        /* Home Button (Logo 1) */
        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .home-btn img {
            height: 45px;
            width: auto;
            opacity: 0.5;
            transition: 0.3s;
        }

        .home-btn:hover img { opacity: 1; transform: scale(1.1); }

        .calc-frame {
            background: var(--panel);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 70px;
            background: #000;
            border: none;
            color: var(--gold);
            font-size: 2.2rem;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border-radius: 10px;
            border: none;
            background: #222;
            color: var(--silver);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #000;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
            background: #2a2a2a;
        }

        .op { color: var(--gold); background: #1a1a1a; }
        .clear { color: #ff4444; }
        .equal { background: var(--gold); color: black; grid-column: span 2; font-weight: bold; }
        
        /* Financial Row */
        .fin { 
            background: #1a2a1a; 
            color: #4CAF50; 
            font-size: 0.8rem; 
            font-weight: bold;
        }

    </style>
</head>
<body>

    <a href="/" class="home-btn">
        <img src="/logo1.png" alt="Home">
    </a>

    <div class="calc-frame">
        <input type="text" id="display" readonly value="0">
        <div class="grid">
            <button class="fin" onclick="applyVAT(1.2)">+VAT</button>
            <button class="fin" onclick="applyVAT(0.8333)">-VAT</button>
            <button class="op" onclick="input('/')">÷</button>
            <button class="clear" onclick="clearDisplay()">AC</button>
            
            <button onclick="input('7')">7</button>
            <button onclick="input('8')">8</button>
            <button onclick="input('9')">9</button>
            <button class="op" onclick="input('*')">×</button>
            
            <button onclick="input('4')">4</button>
            <button onclick="input('5')">5</button>
            <button onclick="input('6')">6</button>
            <button class="op" onclick="input('-')">-</button>
            
            <button onclick="input('1')">1</button>
            <button onclick="input('2')">2</button>
            <button onclick="input('3')">3</button>
            <button class="op" onclick="input('+')">+</button>
            
            <button onclick="input('0')">0</button>
            <button onclick="input('.')">.</button>
            <button class="equal" onclick="solve()">=</button>
        </div>
    </div>

    <script>
        const d = document.getElementById('display');

        function input(v) { 
            if (navigator.vibrate) navigator.vibrate(10);
            if(d.value === '0') d.value = v; 
            else d.value += v; 
        }

        function clearDisplay() { 
            if (navigator.vibrate) navigator.vibrate(20);
            d.value = '0'; 
        }

        function applyVAT(multiplier) {
            if (navigator.vibrate) navigator.vibrate(30);
            try {
                let current = eval(d.value);
                d.value = (current * multiplier).toFixed(2);
            } catch { d.value = "Error"; }
        }

        function solve() { 
            if (navigator.vibrate) navigator.vibrate(40);
            try { 
                let res = eval(d.value.replace('×', '*').replace('÷', '/')); 
                d.value = Number.isInteger(res) ? res : res.toFixed(2);
            } 
            catch { d.value = "Error"; setTimeout(clearDisplay, 1000); }
        }
    </script>
</body>
</html>
