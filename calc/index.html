<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | AI Advanced Suite</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --panel: #111; --accent: #00ff88; --silver: #e0e0e0; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .home-btn { position: absolute; top: 20px; left: 20px; z-index: 100; }
        .home-btn img { height: 35px; opacity: 0.5; transition: 0.3s; }
        .home-btn:hover img { opacity: 1; }

        .calc-container { background: var(--panel); padding: 25px; border-radius: 30px; border: 1px solid #222; width: 360px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); position: relative; }
        #display { width: 100%; height: 85px; background: #000; border: none; color: var(--gold); font-size: 1.6rem; text-align: right; padding: 20px; box-sizing: border-box; border-radius: 15px; margin-bottom: 20px; font-family: 'Courier New', monospace; box-shadow: inset 0 0 20px #000; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; width: 100%; }
        .tab-btn { background: #1a1a1a; border: 1px solid #333; color: #555; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.6rem; text-transform: uppercase; flex: 1; transition: 0.3s; }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: #221d10; }

        #verify-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); 
            border: 1px solid var(--gold); padding: 25px; border-radius: 20px; z-index: 1000; width: 320px; 
            text-align: center; box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            background-image: linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .mcq-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; font-family: monospace; }
        .mcq-btn:hover { background: var(--gold); color: black; border-color: white; transform: scale(1.02); }

        canvas { background: #000; border: 1px solid #333; border-radius: 15px; width: 100%; height: 300px; touch-action: none; display: block; cursor: crosshair; }
        .ai-btn { background: linear-gradient(45deg, #111, #222); color: var(--gold); width: 100%; margin-top: 15px; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        
        #button-grid { display: grid; gap: 8px; }
        #sketch-zone, #photo-zone { display: none; width: 100%; }
        .upload-label { display: block; background: #0a0a0a; padding: 60px 20px; border-radius: 15px; border: 2px dashed #333; color: #444; cursor: pointer; transition: 0.3s; text-align: center; }
        .upload-label:hover { border-color: var(--gold); color: var(--gold); }
        .disclaimer { font-size: 0.55rem; color: #444; margin-top: 20px; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

    <a href="/" class="home-btn"><img src="/logo1.png" alt="Home"></a>

    <div class="tabs">
        <button class="tab-btn active" onclick="setMode(event, 'std')">Standard</button>
        <button class="tab-btn" onclick="setMode(event, 'sci')">Scientific</button>
        <button class="tab-btn" onclick="setMode(event, 'draw')">Sketch AI</button>
        <button class="tab-btn" onclick="setMode(event, 'photo')">Photo AI</button>
    </div>

    <div class="calc-container">
        <input type="text" id="display" readonly value="0">
        
        <div id="math-ui"><div id="button-grid"></div></div>

        <div id="sketch-zone">
            <canvas id="canvas"></canvas>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button style="flex:1; background:#222; color:#666; border:none; border-radius:8px; cursor:pointer;" onclick="clearCanvas()">Clear</button>
                <button class="ai-btn" style="flex:3; margin:0;" onclick="processAI('canvas')">Run AI Scan</button>
            </div>
        </div>

        <div id="photo-zone">
            <label for="file-input" class="upload-label" id="upload-box"> [ SCAN MATHEMATICAL PROBLEM ] </label>
            <input type="file" id="file-input" accept="image/*" onchange="processAI('file')">
        </div>

        <div class="disclaimer">NOTE: AI MAY MAKE MISTAKES. VERIFY RESULTS.</div>
    </div>

    <div id="verify-modal">
        <div style="font-size: 0.7rem; color: var(--gold); margin-bottom: 15px; letter-spacing: 2px; font-weight: bold;">NEURAL VERIFICATION</div>
        <div id="mcq-options"></div>
        <button onclick="closeModal()" style="margin-top:15px; background:transparent; border:none; color:#555; cursor:pointer; font-size:0.7rem; text-decoration: underline;">ABORT REQUEST</button>
    </div>

    <script>
        const d = document.getElementById('display');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function setMode(e, mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            
            document.getElementById('math-ui').style.display = (mode === 'std' || mode === 'sci') ? 'block' : 'none';
            document.getElementById('sketch-zone').style.display = (mode === 'draw') ? 'block' : 'none';
            document.getElementById('photo-zone').style.display = (mode === 'photo') ? 'block' : 'none';
            
            if(mode === 'std' || mode === 'sci') renderButtons(mode);
            if(mode === 'draw') setTimeout(initCanvas, 50);
        }

        async function processAI(source) {
            d.value = "ANALYZING...";
            const input = (source === 'canvas') ? canvas : document.getElementById('file-input').files[0];
            try {
                // Perform recognition
                const result = await Tesseract.recognize(input, 'eng');
                
                // Clean the text: keep only numbers and math symbols
                let text = result.data.text.toLowerCase().replace(/[^\d\+\-\*\/\(\)\.\^]/g, "");
                
                if (text.length > 0) {
                    showMCQ(text);
                } else {
                    d.value = "RE-DRAW CLEARLY";
                }
            } catch (err) { 
                console.error(err);
                d.value = "SCAN_ERROR"; 
            }
        }

        function showMCQ(raw) {
            const modal = document.getElementById('verify-modal');
            const options = document.getElementById('mcq-options');
            options.innerHTML = '';
            modal.style.display = 'block';

            // OCR correction logic
            let corrected = raw.replace(/s/g, '5').replace(/z/g, '2').replace(/o/g, '0');
            let guesses = [...new Set([raw, corrected])];

            guesses.forEach(g => {
                const btn = document.createElement('button');
                btn.className = 'mcq-btn';
                btn.innerText = `RESOLVE AS: ${g}`;
                btn.onclick = () => { d.value = g; solve(); closeModal(); };
                options.appendChild(btn);
            });
        }

        function closeModal() { document.getElementById('verify-modal').style.display = 'none'; }
        
        function solve() { 
            try { 
                // Fix for visual multiplication/division symbols
                let exp = d.value.replace(/×/g, '*').replace(/÷/g, '/');
                let res = math.evaluate(exp); 
                d.value = math.format(res, {precision: 10}); 
            } catch (e) { 
                d.value = "MATH_ERROR"; 
            } 
        }

        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            // Setup drawing styles AFTER resizing canvas
            ctx.fillStyle = "black"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'white'; 
            ctx.lineWidth = 10; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDraw(e) {
            drawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if(e.touches) e.preventDefault();
        }

        function moveDraw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if(e.touches) e.preventDefault();
        }

        function stopDraw() { drawing = false; ctx.closePath(); }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', moveDraw, {passive: false});
        canvas.addEventListener('touchend', stopDraw);

        function clearCanvas() { 
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        function renderButtons(mode) {
            const grid = document.getElementById('button-grid');
            grid.innerHTML = '';
            let btns = (mode === 'std') ? 
                ['C', '/', '*', '⌫', '7', '8', '9', '-', '4', '5', '6', '+', '1', '2', '3', '.', '0', '='] : 
                ['sin', 'cos', 'tan', 'sqrt', '(', ')', '^', '/', '7', '8', '9', '*', '4', '5', '6', '-', '1', '2', '3', '+', '0', '.', 'C', '='];
            
            grid.style.gridTemplateColumns = (mode === 'std') ? 'repeat(4, 1fr)' : 'repeat(6, 1fr)';
            
            btns.forEach(b => {
                const btn = document.createElement('button');
                btn.innerText = b; 
                btn.style.height = '45px'; 
                btn.style.background = '#1a1a1a'; 
                btn.style.color = '#fff'; 
                btn.style.border = 'none'; 
                btn.style.borderRadius = '5px'; 
                btn.style.cursor = 'pointer';
                if(b === '=') { 
                    btn.style.background = 'var(--gold)'; 
                    btn.style.color = 'black'; 
                    btn.onclick = solve; 
                }
                else if(b === 'C') btn.onclick = () => d.value = '0';
                else if(b === '⌫') btn.onclick = () => d.value = d.value.slice(0, -1) || '0';
                else btn.onclick = () => d.value = (d.value === '0') ? b : d.value + b;
                grid.appendChild(btn);
            });
        }
        renderButtons('std');
    </script>
</body>
</html>
