<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Advanced AI Computation</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --silver: #e0e0e0;
            --gold: #d4af37;
            --bg: #0a0a0a;
            --panel: #151515;
            --accent: #4CAF50;
        }

        body {
            background: var(--bg);
            color: var(--silver);
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .home-btn { position: absolute; top: 30px; left: 30px; z-index: 100; }
        .home-btn img { height: 40px; opacity: 0.5; transition: 0.3s; }
        .home-btn:hover img { opacity: 1; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #666;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .calc-container {
            background: var(--panel);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 360px;
            position: relative;
        }

        #display {
            width: 100%;
            height: 80px;
            background: #000;
            border: none;
            color: var(--gold);
            font-size: 1.4rem;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        button {
            height: 50px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: var(--silver);
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #000;
            transition: 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: none; }
        .op { color: var(--gold); }
        .equal { background: var(--gold); color: black; font-weight: bold; }
        .ai-btn { background: var(--accent); color: white; font-size: 0.7rem; }

        /* Zones */
        #sketch-zone, #photo-zone { display: none; width: 100%; text-align: center; }
        #sketch-zone canvas { 
            background: #050505; 
            border: 1px dashed #444; 
            border-radius: 15px; 
            cursor: crosshair;
            touch-action: none;
        }

        .tool-bar { display: flex; justify-content: space-between; margin-top: 10px; gap: 10px; }

        #file-input { display: none; }
        .upload-label {
            display: block;
            background: #222;
            padding: 40px 20px;
            border-radius: 15px;
            border: 2px dashed #444;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }
        .upload-label:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <a href="/" class="home-btn"><img src="/logo1.png" alt="Home"></a>

    <div class="tabs">
        <button class="tab-btn active" onclick="setMode('std')">Standard</button>
        <button class="tab-btn" onclick="setMode('sci')">Scientific</button>
        <button class="tab-btn" onclick="setMode('draw')">Sketch AI</button>
        <button class="tab-btn" onclick="setMode('photo')">Photo AI</button>
    </div>

    <div class="calc-container">
        <input type="text" id="display" readonly value="0">
        
        <div id="math-ui">
            <div id="button-grid" class="grid"></div>
        </div>

        <div id="sketch-zone">
            <canvas id="canvas" width="310" height="300"></canvas>
            <div class="tool-bar">
                <button class="tab-btn" onclick="clearCanvas()">Clear</button>
                <button class="tab-btn ai-btn" onclick="processAI('canvas')">Solve Handwriting</button>
            </div>
        </div>

        <div id="photo-zone">
            <label for="file-input" class="upload-label" id="drop-text">
                Click to Upload or Take Photo of Problem
            </label>
            <input type="file" id="file-input" accept="image/*" onchange="processAI('file')">
            <div class="tool-bar" style="justify-content: center;">
                <p style="font-size: 0.6rem; color: #444;">Supports: A-Level Math, Algebra, Calculus</p>
            </div>
        </div>
    </div>

    <script>
        const d = document.getElementById('display');
        const grid = document.getElementById('button-grid');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function setMode(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('math-ui').style.display = (mode === 'std' || mode === 'sci') ? 'block' : 'none';
            document.getElementById('sketch-zone').style.display = (mode === 'draw') ? 'block' : 'none';
            document.getElementById('photo-zone').style.display = (mode === 'photo') ? 'block' : 'none';
            
            if(mode === 'std' || mode === 'sci') renderButtons(mode);
            if(mode === 'draw') initCanvas();
        }

        function renderButtons(mode) {
            grid.innerHTML = '';
            let btns = (mode === 'std') ? 
                ['C', '/', '*', '⌫', '7', '8', '9', '-', '4', '5', '6', '+', '1', '2', '3', '.', '0', '='] :
                ['sin', 'cos', 'tan', 'log', 'C', 'sqrt', '(', ')', '^', '/', '7', '8', '9', '*', '⌫', '4', '5', '6', '-', 'exp', '1', '2', '3', '+', 'det', '0', '.', '=', 'pi', 'e'];

            grid.style.gridTemplateColumns = (mode === 'std') ? 'repeat(4, 1fr)' : 'repeat(5, 1fr)';

            btns.forEach(b => {
                const btn = document.createElement('button');
                btn.innerText = b;
                if(['/', '*', '-', '+', '=', 'sin', 'cos', 'tan', 'log', 'sqrt', '^'].includes(b)) btn.className = 'op';
                if(b === '=') { btn.className = 'equal'; btn.onclick = solve; }
                else if(b === 'C') btn.onclick = clearDisplay;
                else if(b === '⌫') btn.onclick = backspace;
                else btn.onclick = () => input(b);
                grid.appendChild(btn);
            });
        }

        // AI PROCESSOR (THE "BRAIN")
        async function processAI(source) {
            d.value = "AI Scanning...";
            let inputSource = (source === 'canvas') ? canvas : document.getElementById('file-input').files[0];
            
            try {
                const result = await Tesseract.recognize(inputSource, 'eng', {
                    tessedit_char_whitelist: '0123456789+-*/()=xsincostansqrtlog' 
                });
                
                // Clean the recognized text
                let cleanMath = result.data.text.replace(/(\r\n|\n|\r)/gm, "").replace(/\s/g, "").replace(/x/g, "*");
                
                // If there's an equals sign, take the part before it
                if(cleanMath.includes('=')) cleanMath = cleanMath.split('=')[0];
                
                d.value = cleanMath;
                setTimeout(solve, 500); // Automatically solve the recognized text
            } catch (err) {
                d.value = "AI Error: Unreadable";
            }
        }

        function input(v) { d.value = (d.value === '0') ? v : d.value + v; }
        function clearDisplay() { d.value = '0'; }
        function backspace() { d.value = d.value.slice(0, -1) || '0'; }

        function solve() {
            try {
                let expression = d.value;
                let res = math.evaluate(expression);
                d.value = math.format(res, {precision: 10});
            } catch (e) {
                d.value = "Error";
            }
        }

        // CANVAS LOGIC
        function initCanvas() {
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height); // Set black background for better OCR contrast
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });

        // Mobile Touch Support
        canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('touchmove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }, {passive: false});

        function clearCanvas() { ctx.fillRect(0, 0, canvas.width, canvas.height); }

        renderButtons('std');
    </script>
</body>
</html>
