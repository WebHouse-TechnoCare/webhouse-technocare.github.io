<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Chronometer</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <style>
        body {
            background: #050505;
            color: #d4af37;
            font-family: 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .watch-face {
            position: relative;
            text-align: center;
        }

        #time {
            font-size: 6rem;
            font-weight: 100;
            letter-spacing: -2px;
            margin: 0;
            z-index: 2;
            position: relative;
        }

        #date {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #666;
            margin-top: 10px;
        }

        .bg-gear {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            z-index: 1;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .home-link {
            position: absolute;
            bottom: 40px;
            text-decoration: none;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <svg class="bg-gear" width="500" height="500" viewBox="0 0 100 100">
        <path d="M50 10 L55 25 L45 25 Z" fill="currentColor"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2"/>
    </svg>

    <div class="watch-face">
        <h1 id="time">00:00:00</h1>
        <div id="date">Loading...</div>
    </div>

    <a href="/" class="home-link">RETURN TO HUB</a>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
