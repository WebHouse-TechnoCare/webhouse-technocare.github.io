<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Chronometer</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
        }

        body {
            background: var(--bg);
            color: var(--gold);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* Home Button (Logo 1) */
        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .home-btn img {
            height: 50px;
            width: auto;
            opacity: 0.6;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
        }

        .home-btn:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        .watch-face {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        #time {
            font-size: 8rem;
            font-weight: 100;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #555;
            margin-top: 15px;
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .btn-util {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #666;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            outline: none;
        }

        .btn-util:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .active-status {
            color: var(--gold) !important;
            border-color: var(--gold) !important;
            background: rgba(212, 175, 55, 0.1) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Background Gear Decoration */
        .bg-gear {
            position: absolute;
            opacity: 0.03;
            z-index: 1;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            #time { font-size: 4rem; }
            #date { font-size: 0.8rem; letter-spacing: 3px; }
            .controls { gap: 10px; }
        }
    </style>
</head>
<body>

    <a href="/" class="home-btn">
        <img src="/logo1.png" alt="CalcClock Home">
    </a>

    <svg class="bg-gear" width="600" height="600" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="0.1" stroke-dasharray="1,2"/>
        <path d="M50 5 L52 15 L48 15 Z" fill="currentColor"/>
    </svg>

    <div class="watch-face">
        <h1 id="time">00:00:00</h1>
        <div id="date">CALCCLOCK CHRONOMETER</div>
    </div>

    <div class="controls">
        <button class="btn-util" id="wakeBtn">Stay Awake: OFF</button>
        <button class="btn-util" id="fsBtn">Fullscreen</button>
    </div>

    <script>
        // 1. Time Logic
        function update() {
            const now = new Date();
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');
            if(timeEl) timeEl.innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            if(dateEl) {
                const options = { weekday: 'long', day: 'numeric', month: 'long' };
                dateEl.innerText = now.toLocaleDateString('en-GB', options);
            }
        }
        setInterval(update, 1000);
        update();

        // 2. Fullscreen Logic
        const fsBtn = document.getElementById('fsBtn');
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Error attempting to enable full-screen mode:", err.message);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Update button text based on fullscreen state
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsBtn.innerText = "Exit Fullscreen";
                fsBtn.classList.add('active-status');
            } else {
                fsBtn.innerText = "Fullscreen";
                fsBtn.classList.remove('active-status');
            }
        });

        // 3. Screen Wake Lock Logic
        let wakeLock = null;
        const wakeBtn = document.getElementById('wakeBtn');

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeBtn.innerText = "Stay Awake: ON";
                    wakeBtn.classList.add('active-status');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock was released');
                    });
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
                wakeBtn.innerText = "Stay Awake: Error";
            }
        }

        wakeBtn.addEventListener('click', async () => {
            if (wakeLock === null) {
                await requestWakeLock();
            } else {
                wakeLock.release();
                wakeLock = null;
                wakeBtn.innerText = "Stay Awake: OFF";
                wakeBtn.classList.remove('active-status');
            }
        });

        // Re-request wake lock if tab becomes visible again (mobile optimization)
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
