<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcClock | Chronometer Pro</title>
    <link rel="icon" type="image/png" href="/logo1.png">
    <style>
        :root {
            --gold: #d4af37;
            --ruby: #9b111e;
            --bg: #050505;
            --accent: var(--gold); /* Dynamic accent color */
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            transition: color 1s ease, background 0.5s;
        }

        /* Ambient Canvas Background */
        #ambientCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .home-btn img {
            height: 50px;
            width: auto;
            opacity: 0.6;
        }

        .watch-face {
            position: relative;
            text-align: center;
            z-index: 2;
            pointer-events: none; 
        }

        #time {
            font-size: 8rem;
            font-weight: 100;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #date {
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #555;
            margin-top: 15px;
        }

        /* --- ADDED: World Clock Styles --- */
        .sub-dials {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .dial {
            text-align: center;
            min-width: 100px;
        }

        .dial-time {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--accent);
            opacity: 0.8;
        }

        .dial-label {
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-top: 5px;
        }

        /* Hide dials when Pomodoro is active */
        .pomo-active .sub-dials {
            opacity: 0;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn-util {
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            color: #666;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-util:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .active-status {
            color: var(--accent) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        @media (max-width: 600px) {
            #time { font-size: 4rem; }
            .sub-dials { gap: 15px; margin-top: 20px; }
            .dial-time { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="ambientCanvas"></canvas>

    <a href="/" class="home-btn">
        <img src="/logo1.png" alt="CalcClock Home">
    </a>

    <div class="watch-face">
        <h1 id="time">00:00:00</h1>
        <div id="date">CALCCLOCK CHRONOMETER</div>

        <div class="sub-dials" id="subDials">
            <div class="dial">
                <div class="dial-time" id="nyc">00:00</div>
                <div class="dial-label">New York</div>
            </div>
            <div class="dial">
                <div class="dial-time" id="tokyo">00:00</div>
                <div class="dial-label">Tokyo</div>
            </div>
            <div class="dial">
                <div class="dial-time" id="london">00:00</div>
                <div class="dial-label">London</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-util" id="pomoBtn">Pomodoro: OFF</button>
        <button class="btn-util" id="wakeBtn">Stay Awake: OFF</button>
        <button class="btn-util" id="fsBtn">Fullscreen</button>
    </div>

    <script>
        // --- 1. Ambient Starfield Logic ---
        const canvas = document.getElementById('ambientCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function drawAmbient() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            ctx.globalAlpha = 0.2;
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.x += p.speedX + (mouse.x - canvas.width/2) * 0.001;
                p.y += p.speedY + (mouse.y - canvas.height/2) * 0.001;

                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height;
                if(p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(drawAmbient);
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawAmbient();

        // --- 2. Pomodoro Logic ---
        let pomoActive = false;
        let pomoTime = 25 * 60; 
        let pomoInterval = null;
        const pomoBtn = document.getElementById('pomoBtn');

        function updateDisplay() {
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');
            const now = new Date();

            if (!pomoActive) {
                document.body.classList.remove('pomo-active'); // Show sub-dials
                timeEl.innerText = now.toLocaleTimeString('en-GB', { hour12: false });
                
                // --- ADDED: World Clock Update Logic ---
                const zones = {
                    nyc: 'America/New_York',
                    tokyo: 'Asia/Tokyo',
                    london: 'Europe/London'
                };

                for (const [id, zone] of Object.entries(zones)) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.innerText = now.toLocaleTimeString('en-GB', {
                            hour12: false,
                            hour: '2-digit',
                            minute: '2-digit',
                            timeZone: zone
                        });
                    }
                }

                const options = { weekday: 'long', day: 'numeric', month: 'long' };
                dateEl.innerText = now.toLocaleDateString('en-GB', options);
                document.documentElement.style.setProperty('--accent', 'var(--gold)');
            } else {
                document.body.classList.add('pomo-active'); // Hide sub-dials
                let mins = Math.floor(pomoTime / 60);
                let secs = pomoTime % 60;
                timeEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                dateEl.innerText = "FOCUS SESSION ACTIVE";
                document.documentElement.style.setProperty('--accent', 'var(--ruby)');
            }
        }

        pomoBtn.addEventListener('click', () => {
            pomoActive = !pomoActive;
            if (pomoActive) {
                pomoTime = 25 * 60;
                pomoBtn.innerText = "Focus: ON (25m)";
                pomoBtn.classList.add('active-status');
                pomoInterval = setInterval(() => {
                    pomoTime--;
                    if(pomoTime <= 0) {
                        pomoActive = false;
                        clearInterval(pomoInterval);
                        alert("Focus session complete! Take a break.");
                    }
                    updateDisplay();
                }, 1000);
            } else {
                clearInterval(pomoInterval);
                pomoBtn.innerText = "Pomodoro: OFF";
                pomoBtn.classList.remove('active-status');
            }
            updateDisplay();
        });

        setInterval(() => { if(!pomoActive) updateDisplay(); }, 1000);
        updateDisplay();

        // --- 3. Fullscreen & Wake Lock ---
        const fsBtn = document.getElementById('fsBtn');
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        let wakeLock = null;
        const wakeBtn = document.getElementById('wakeBtn');
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeBtn.innerText = "Stay Awake: ON";
                    wakeBtn.classList.add('active-status');
                }
            } catch (err) { wakeBtn.innerText = "Stay Awake: Error"; }
        }

        wakeBtn.addEventListener('click', async () => {
            if (wakeLock === null) await requestWakeLock();
            else {
                wakeLock.release();
                wakeLock = null;
                wakeBtn.innerText = "Stay Awake: OFF";
                wakeBtn.classList.remove('active-status');
            }
        });
    </script>
</body>
</html>
